version: '3.9'

services:

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: prospera
      POSTGRES_PASSWORD: prospera
      POSTGRES_DB: prospera
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U prospera -d prospera']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    command: npx tsx lib/db/migrate.ts
    environment:
      DATABASE_URL: postgresql://prospera:prospera@postgres:5432/prospera
      SKIP_ENV_VALIDATION: 'true'
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ['migrate']

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://prospera:prospera@postgres:5432/prospera
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: '3000'
      HOSTNAME: '0.0.0.0'
    env_file:
      - .env.local
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://prospera:prospera@postgres:5432/prospera
      REDIS_URL: redis://redis:6379
    env_file:
      - .env.local
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  uploads_data:
